<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heart n Soul</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fff8f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .heart {
      font-size: 72px;
      margin-bottom: 16px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    h1 {
      font-size: 2.2rem;
      color: #c0392b;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .tagline {
      font-size: 1.25rem;
      color: #555;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 2px solid #fde0d8;
    }

    .card p {
      font-size: 1.15rem;
      color: #333;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      background: #fde0d8;
      color: #c0392b;
      border-radius: 30px;
      padding: 8px 20px;
      font-size: 1rem;
      font-weight: 700;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="heart">❤️</div>
  <h1>Heart n Soul</h1>
  <p class="tagline">Something good is coming.<br>We're building it together.</p>

  <div class="card">
    <p>
      This website is being made <strong>with</strong> people, not just for them.
      Your ideas and feedback will shape what it becomes.
    </p>
    <p>
      Come back soon — the real thing will be here shortly!
    </p>
    <span class="badge">🛠️ Workshop in progress</span>
  </div>

  <footer>Heart n Soul &mdash; 2026</footer>

</body>
</html>
