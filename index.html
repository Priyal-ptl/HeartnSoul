<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>My Appointments — Heart n Soul</title>
  <style>
    :root {
      --red: #c0392b; --red-light: #fde0d8; --red-pale: #fff8f4;
      --white: #fff; --text: #1a1a1a; --muted: #666; --border: #e8e0dc;
      --green: #1e8449; --green-bg: #eafaf1;
      --amber: #b7770d; --amber-bg: #fef9e7;
      --blue: #1a5276; --blue-bg: #eaf4fb;
      --purple: #6c3483; --purple-bg: #f5eef8;
      --alert-bg: #fdedec;
      --phase1: #1a5276; --phase1-bg: #eaf4fb;
      --phase2: #1e8449; --phase2-bg: #eafaf1;
      --phase3: #6c3483; --phase3-bg: #f5eef8;
      --radius: 16px; --radius-sm: 10px;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, "Segoe UI", Arial, sans-serif;
      background: var(--red-pale); color: var(--text);
      font-size: 18px; line-height: 1.5;
      max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px;
    }
    .screen { display: none; }
    .screen.active { display: block; }

    /* HEADER */
    .header {
      background: var(--red); color: white;
      padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 22px; font-weight: 800; }
    .header-date { font-size: 14px; opacity: 0.85; margin-top: 2px; }
    .btn-speak {
      background: rgba(255,255,255,0.22); border: none; color: white;
      border-radius: 30px; padding: 9px 16px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; flex-shrink: 0; white-space: nowrap;
    }
    .btn-speak:active { opacity: 0.7; }
    .btn-back {
      background: none; border: none; color: white;
      font-size: 18px; font-weight: 700; cursor: pointer; font-family: inherit; padding: 4px 12px 4px 0;
    }

    /* WEATHER BAR */
    .weather-bar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 10px;
      font-size: 16px; color: var(--muted);
    }

    /* HOME CARDS */
    .section-label {
      font-size: 13px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--muted); padding: 18px 20px 8px;
    }
    .event-card {
      background: var(--white); border-radius: var(--radius);
      margin: 0 16px 12px; padding: 18px 48px 18px 22px;
      box-shadow: var(--shadow); cursor: pointer;
      border: 2.5px solid transparent; position: relative;
    }
    .event-card:active { border-color: var(--red); }
    .event-type-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 6px; border-radius: 14px 0 0 14px;
    }
    .event-title { font-size: 22px; font-weight: 900; line-height: 1.2; margin-bottom: 10px; }
    .event-date-line {
      font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 3px;
    }
    .event-time-line {
      font-size: 17px; font-weight: 700; color: var(--red); margin-bottom: 3px;
    }
    .event-location-line {
      font-size: 16px; color: var(--muted); font-weight: 500;
    }
    .alert-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--alert-bg); color: var(--red);
      border-radius: 20px; padding: 5px 12px; font-size: 14px; font-weight: 800; margin-top: 10px;
    }
    .chevron { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #ccc; font-size: 22px; }

    /* DETAIL HERO */
    .detail-hero { padding: 20px 20px 6px; }
    .detail-title { font-size: 28px; font-weight: 900; line-height: 1.2; margin-bottom: 14px; }
    .detail-date { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .detail-time { font-size: 19px; font-weight: 800; color: var(--red); margin-bottom: 4px; }
    .detail-duration { font-size: 16px; color: var(--muted); font-weight: 600; }

    /* ALERT */
    .alert-banner { background: var(--alert-bg); border-left: 5px solid var(--red); padding: 18px 20px; }
    .alert-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .alert-title { font-size: 18px; font-weight: 800; color: var(--red); }
    .alert-msg { font-size: 17px; margin-bottom: 8px; }
    .alert-fix { font-size: 16px; color: var(--green); font-weight: 700; }

    /* PHASE SECTIONS */
    .phase {
      margin: 14px 16px 0;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .phase-header {
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
    }
    .phase-header-left { display: flex; align-items: center; gap: 12px; }
    .phase-icon { font-size: 26px; }
    .phase-title { font-size: 17px; font-weight: 800; }
    .phase-subtitle { font-size: 14px; opacity: 0.8; margin-top: 1px; }
    .phase-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .phase-chevron { font-size: 18px; transition: transform 0.2s; color: inherit; opacity: 0.7; }
    .phase-chevron.open { transform: rotate(90deg); }
    .phase-body { display: none; background: var(--white); }
    .phase-body.open { display: block; }

    .phase-1 .phase-header { background: var(--phase1-bg); color: var(--phase1); }
    .phase-2 .phase-header { background: var(--phase2-bg); color: var(--phase2); }
    .phase-3 .phase-header { background: var(--phase3-bg); color: var(--phase3); }

    /* SECTION INSIDE PHASE */
    .subsection { padding: 16px 18px; border-bottom: 1px solid var(--border); }
    .subsection:last-child { border-bottom: none; }
    .subsection-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .subsection-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .btn-speak-sm {
      background: var(--red-light); border: none; color: var(--red);
      border-radius: 20px; padding: 5px 12px; font-size: 13px; font-weight: 800;
      cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0;
    }
    .btn-speak-sm:active { opacity: 0.7; }

    /* DOCUMENT LIST */
    .doc-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-check {
      width: 26px; height: 26px; border-radius: 6px;
      border: 2.5px solid var(--border); flex-shrink: 0; margin-top: 2px;
      cursor: pointer; background: white;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .doc-check.checked { background: var(--green); border-color: var(--green); color: white; }
    .doc-text { font-size: 17px; line-height: 1.4; font-weight: 600; }

    /* JOURNEY */
    .journey-tip {
      background: var(--amber-bg); color: var(--amber);
      border-radius: var(--radius-sm); padding: 12px 14px;
      font-size: 16px; font-weight: 700; margin-bottom: 14px;
    }

    /* VENUE PHOTOS */
    .venue-photos { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
    .venue-photos::-webkit-scrollbar { display: none; }
    .venue-photo { width: 220px; height: 140px; object-fit: cover; border-radius: 10px; flex-shrink: 0; background: var(--border); }
    .photo-caption { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 6px; }

    /* TRANSPORT */
    .transport-toggle { display: flex; gap: 10px; margin-bottom: 16px; }
    .t-btn {
      flex: 1; padding: 12px 8px; border-radius: var(--radius-sm);
      border: 2.5px solid var(--border); background: var(--white);
      font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .t-btn .ti { font-size: 26px; }
    .t-btn.active { border-color: var(--phase1); background: var(--phase1-bg); color: var(--phase1); }
    .t-panel { display: none; }
    .t-panel.active { display: block; }
    .route-group { margin-bottom: 16px; }
    .route-group:last-child { margin-bottom: 0; }
    .route-label { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 10px; }
    .route-step { display: flex; gap: 12px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .route-step:last-child { border-bottom: none; }
    .step-num {
      background: var(--phase1); color: white; width: 26px; height: 26px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0; margin-top: 3px;
    }
    .step-text { font-size: 16px; line-height: 1.5; }
    .route-divider { border: none; border-top: 2px dashed var(--border); margin: 14px 0; }

    /* ARRIVAL INFO */
    .info-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .info-item:last-child { border-bottom: none; }
    .info-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
    .info-text { font-size: 17px; line-height: 1.45; }
    .info-label { font-size: 13px; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }

    /* ACTION ITEMS */
    .action-item {
      display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .action-item:last-child { border-bottom: none; }
    .action-check {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2.5px solid var(--border); flex-shrink: 0; margin-top: 2px;
      cursor: pointer; background: white;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .action-check.checked { background: var(--purple); border-color: var(--purple); color: white; }
    .action-text { font-size: 17px; line-height: 1.4; font-weight: 600; }

    /* WEATHER */
    .wx-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .wx-icon { font-size: 48px; }
    .wx-temp { font-size: 32px; font-weight: 800; line-height: 1; }
    .wx-desc { font-size: 16px; color: var(--muted); margin-top: 3px; }
    .wx-tip { background: var(--amber-bg); color: var(--amber); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 16px; font-weight: 700; }

    /* BIG BUTTONS */
    .btn-action {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px; border-radius: var(--radius-sm); border: none;
      font-size: 17px; font-weight: 800; cursor: pointer; font-family: inherit;
      margin-bottom: 10px; text-decoration: none; color: white;
    }
    .btn-action:last-child { margin-bottom: 0; }
    .btn-maps { background: #4285f4; }
    .btn-uber { background: #000; }
    .btn-zoom { background: #2d8cff; }
    .btn-call { background: var(--green); }
    .btn-gcal { background: var(--green); }
    .btn-ics { background: var(--blue); }

    /* ONLINE */
    .zoom-id { font-family: monospace; font-size: 26px; font-weight: 800; letter-spacing: 3px; background: var(--blue-bg); color: var(--blue); padding: 12px 20px; border-radius: var(--radius-sm); margin: 8px 0; display: inline-block; }

    /* STICKY BOTTOM */
    .sticky-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 480px; margin: 0 auto;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 12px 16px; z-index: 200;
    }

    /* NOTES */
    .notes-text { font-size: 17px; line-height: 1.65; }
    .contact-row { display: flex; align-items: center; gap: 12px; font-size: 17px; }
  </style>
</head>

var currentEvent = null;
var currentTransport = "pub";

function formatDate(ds) {
  return new Date(ds + "T00:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });
}

function dayLabel(ds) {
  var d = new Date(ds + "T00:00:00");
  var today = new Date(); today.setHours(0,0,0,0);
  var diff = Math.round((d - today) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  return d.toLocaleDateString("en-GB", { weekday: "long" });
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1;
  window.speechSynthesis.speak(u);
}

function speakHome() {
  var txt = "Your upcoming appointments. " + EVENTS.map(function(e) {
    return e.title + ". " + dayLabel(e.date) + " at " + e.time + ". " + (e.online ? "Online." : e.location.name + ".");
  }).join(". Next: ");
  speak(txt);
}

function speakDetail() {
  var ev = currentEvent; if (!ev) return;
  var t = ev.title + ". " + formatDate(ev.date) + " at " + ev.time + ". ";
  if (ev.alert) t += "Important notice. " + ev.alert.message + " " + ev.alert.fix + ". ";
  if (ev.online && ev.isPhone) {
    t += "This is a phone call. Your doctor will call you. ";
  } else if (ev.online) {
    t += "Online Zoom meeting. ID: " + ev.location.zoomId + ". Password: " + ev.location.zoomPassword + ". ";
  } else {
    t += "Location: " + ev.location.name + ". " + ev.location.address + ". ";
  }
  t += "Before you go: " + ev.before.documents.join(". ") + ". ";
  t += "When you get there: " + ev.arrival.contact + ". ";
  t += "After the event: " + ev.after.actions.join(". ");
  speak(t);
}

function renderHome() {
  document.getElementById("today-date").textContent =
    new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  var html = "";
  EVENTS.forEach(function(ev) {
    html += '<div class="event-card" onclick="showDetail(' + ev.id + ')">';
    html += '<div class="event-type-bar" style="background:' + ev.typeColor + '"></div>';
    html += '<div class="event-title">' + ev.title + "</div>";
    html += '<div class="event-date-line">📅 ' + dayLabel(ev.date) + " — " + formatDate(ev.date) + "</div>";
    html += '<div class="event-time-line">🕐 ' + ev.time + " &nbsp;·&nbsp; " + ev.duration + "</div>";
    html += '<div class="event-location-line">' + (ev.online ? "💻 Online" : "📍 " + ev.location.name) + "</div>";
    if (ev.alert) html += '<div class="alert-chip">⚠️ Important notice</div>';
    html += '<span class="chevron">›</span>';
    html += "</div>";
  });
  document.getElementById("events-list").innerHTML = html;
}

function togglePhase(num) {
  var body = document.getElementById("phase-body-" + num);
  var chev = document.getElementById("phase-chev-" + num);
  if (!body) return;
  var isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  if (chev) chev.classList.toggle("open", !isOpen);
}

function setTransport(type) {
  currentTransport = type;
  var pub = document.getElementById("panel-pub");
  var priv = document.getElementById("panel-priv");
  var btnPub = document.getElementById("btn-pub");
  var btnPriv = document.getElementById("btn-priv");
  if (pub) pub.classList.toggle("active", type === "pub");
  if (priv) priv.classList.toggle("active", type === "priv");
  if (btnPub) btnPub.classList.toggle("active", type === "pub");
  if (btnPriv) btnPriv.classList.toggle("active", type === "priv");
}

function toggleCheck(el, color) {
  var isChecked = el.classList.contains("checked");
  el.classList.toggle("checked", !isChecked);
  el.textContent = isChecked ? "" : "✓";
}

function showDetail(id) {
  currentEvent = null; currentTransport = "pub";
  for (var i = 0; i < EVENTS.length; i++) {
    if (EVENTS[i].id === id) { currentEvent = EVENTS[i]; break; }
  }
  if (!currentEvent) return;
  var ev = currentEvent;
  var html = "";

  // Alert
  if (ev.alert) {
    html += '<div class="alert-banner">';
    html += '<div class="alert-header"><div class="alert-title">⚠️ ' + ev.alert.title + "</div>";

    html += '<div class="alert-msg">' + ev.alert.message + "</div>";
    html += '<div class="alert-fix">✅ ' + ev.alert.fix + "</div>";

  html += '<div class="detail-title">' + ev.title + "</div>";
  html += '<div class="detail-date">📅 ' + dayLabel(ev.date) + " — " + formatDate(ev.date) + "</div>";
  html += '<div class="detail-time">🕐 ' + ev.time + "&nbsp; · &nbsp;" + ev.duration + "</div>";
  if (ev.weather) {
    html += '<div style="margin-top:8px; display:flex; align-items:center; gap:8px; font-size:16px; color:var(--muted); font-weight:600;">';
    html += ev.weather.icon + " " + ev.weather.temp + " — " + ev.weather.description;
    html += "</div>";
  }
  html += "</div>";

  // ─── PHASE 1: BEFORE ───
  html += '<div class="phase phase-1">';
  html += '<div class="phase-header" onclick="togglePhase(1)">';
  html += '<div class="phase-header-left"><div class="phase-icon">📋</div>';
  html += '<div><div class="phase-title">Before you go</div><div class="phase-subtitle">Documents, journey, weather</div></div></div>';
  html += '<div class="phase-controls">';
  html += '<button class="btn-speak-sm" onclick="event.stopPropagation();speakBefore()">🔊 Read</button>';
  html += '<span class="phase-chevron open" id="phase-chev-1">›</span></div>';
  html += "</div>";
  html += '<div class="phase-body open" id="phase-body-1">';

  // Journey tip
  html += '<div class="subsection">';
  html += '<div class="subsection-header"><div class="subsection-title">Plan your journey</div>';
  html += '<button class="btn-speak-sm" onclick="speak(\'' + ev.before.journeyTip.replace(/'/g,"") + '\')">🔊</button></div>';
  html += '<div class="journey-tip">⏰ ' + ev.before.journeyTip + "</div>";

  if (!ev.online) {
    // Transport toggle
    html += '<div class="transport-toggle">';
    html += '<button class="t-btn active" id="btn-pub" onclick="setTransport(\'pub\')"><span class="ti">🚌</span>Public</button>';
    html += '<button class="t-btn" id="btn-priv" onclick="setTransport(\'priv\')"><span class="ti">🚗</span>Personal/Uber</button>';
    html += "</div>";
    html += '<div class="t-panel active" id="panel-pub">';
    ev.location.publicRoutes.forEach(function(r, ri) {
      html += '<div class="route-group"><div class="route-label">' + r.icon + " " + r.label + "</div>";
      r.steps.forEach(function(s, i) {
        html += '<div class="route-step"><div class="step-num">' + (i+1) + '</div><div class="step-text">' + s + "</div></div>";
      });
      html += "</div>";
      if (ri < ev.location.publicRoutes.length - 1) html += '<hr class="route-divider">';
    });
    html += "</div>";
    html += '<div class="t-panel" id="panel-priv">';
    ev.location.privateRoutes.forEach(function(r, ri) {
      html += '<div class="route-group"><div class="route-label">' + r.icon + " " + r.label + "</div>";
      r.steps.forEach(function(s, i) {
        html += '<div class="route-step"><div class="step-num">' + (i+1) + '</div><div class="step-text">' + s + "</div></div>";
      });
      html += "</div>";
      if (ri < ev.location.privateRoutes.length - 1) html += '<hr class="route-divider">';
    });
    html += '<div style="margin-top:16px;">';
    html += '<a href="' + ev.location.googleMaps + '" target="_blank" class="btn-action btn-maps">🗺️ Open in Google Maps</a>';
    html += '<a href="' + ev.location.uber + '" target="_blank" class="btn-action btn-uber">🚕 Book an Uber</a>';
    html += "</div></div>";
  }
  html += "</div>";

  // Documents
  html += '<div class="subsection">';
  html += '<div class="subsection-header"><div class="subsection-title">What to bring</div>';
  html += '<button class="btn-speak-sm" onclick="speak(\'What to bring. ' + ev.before.documents.join(". ").replace(/'/g,"") + '\')">🔊</button></div>';
  ev.before.documents.forEach(function(doc, i) {
    html += '<div class="doc-item">';
    html += '<div class="doc-check" id="doc-' + i + '" onclick="toggleCheck(this)"></div>';
    html += '<div class="doc-text">' + doc + "</div></div>";
  });
  html += "</div>";

  // Weather
  if (ev.weather) {
    html += '<div class="subsection">';
    html += '<div class="subsection-header"><div class="subsection-title">Weather on the day</div>';
    html += '<button class="btn-speak-sm" onclick="speak(\'' + ev.weather.temp + '. ' + ev.weather.description + '. ' + ev.weather.advice.replace(/'/g,"") + '\')">🔊</button></div>';
    html += '<div class="wx-row"><div class="wx-icon">' + ev.weather.icon + '</div><div>';
    html += '<div class="wx-temp">' + ev.weather.temp + "</div>";
    html += '<div class="wx-desc">' + ev.weather.description + "</div></div></div>";

    html += "</div>";
  }

  // Venue photos
  if (!ev.online && ev.location.photos) {
    html += '<div class="subsection">';

  }

  html += "</div></div>"; // close phase-body + phase

  // ─── PHASE 2: ARRIVAL ───
  html += '<div class="phase phase-2">';

  html += '<div class="phase-header-left"><div class="phase-icon">🏢</div>';
  html += '<div><div class="phase-title">When you get there</div><div class="phase-subtitle">Check in, who to find</div></div></div>';
  html += '<div class="phase-controls">';
  html += '<button class="btn-speak-sm" onclick="event.stopPropagation();speakArrival()">🔊 Read</button>';
  html += '<span class="phase-chevron" id="phase-chev-2">›</span></div>';
  html += "</div>";
  html += '<div class="phase-body" id="phase-body-2">';

  if (!ev.online && ev.location.floor) {
    html += '<div class="subsection">';
    html += '<div class="subsection-header"><div class="subsection-title">Where to go</div>';
    html += '<button class="btn-speak-sm" onclick="speak(\'' + ev.location.floor.replace(/'/g,"") + '\')">🔊</button></div>';
    html += '<div class="info-item"><div class="info-icon">📍</div>';
    html += '<div class="info-text"><div class="info-label">' + ev.location.name + "</div>" + ev.location.floor + "</div></div>";
    html += "</div>";
  }

  html += '<div class="subsection">';
  html += '<div class="subsection-header"><div class="subsection-title">Check in</div>';
  html += '<button class="btn-speak-sm" onclick="speak(\'' + ev.arrival.kiosk.replace(/'/g,"") + '\')">🔊</button></div>';
  html += '<div class="info-item"><div class="info-icon">🖥️</div>';
  html += '<div class="info-text">' + ev.arrival.kiosk + "</div></div>";
  html += "</div>";

  html += '<div class="subsection">';
  html += '<div class="subsection-header"><div class="subsection-title">Who to speak to</div>';
  html += '<button class="btn-speak-sm" onclick="speak(\'' + ev.arrival.contact.replace(/'/g,"") + '\')">🔊</button></div>';
  html += '<div class="info-item"><div class="info-icon">👋</div>';
  html += '<div class="info-text">' + ev.arrival.contact + "</div></div>";
  html += '<div class="info-item"><div class="info-icon">👤</div>';
  html += '<div class="info-text"><div class="info-label">Contact</div>' + ev.contact.name + "<br><span style=\"color:var(--muted);font-size:16px;\">" + ev.contact.detail + "</span></div></div>";
  html += "</div>";

  if (ev.online) {
    html += '<div class="subsection">';
    html += '<div class="subsection-header"><div class="subsection-title">How to join</div></div>';
    if (ev.isPhone) {
      html += '<div style="text-align:center;padding:10px 0 4px;">';
      html += '<div style="font-size:48px;margin-bottom:10px;">📞</div>';
      html += '<div class="zoom-id">' + ev.location.zoomId + "</div>";
      html += '<div style="font-size:16px;color:var(--muted);margin:8px 0 16px;">Your doctor will call this number at ' + ev.time + "</div>";
      html += '<a href="' + ev.location.zoomLink + '" class="btn-action btn-call">📞 Call them back if needed</a>';
      html += "</div>";
    } else {
      html += '<div style="text-align:center;padding:10px 0 4px;">';
      html += '<div style="font-size:48px;margin-bottom:10px;">💻</div>';
      html += '<div class="zoom-id">' + ev.location.zoomId + "</div>";
      html += '<div style="font-size:16px;color:var(--muted);margin:8px 0 16px;">Password: <strong>' + ev.location.zoomPassword + "</strong></div>";
      html += '<a href="' + ev.location.zoomLink + '" target="_blank" class="btn-action btn-zoom">🎥 Open Zoom now</a>';
      html += "</div>";
    }
    html += "</div>";
  }

  html += "</div></div>"; // close phase-body + phase

  // ─── PHASE 3: AFTER ───
  html += '<div class="phase phase-3">';
  html += '<div class="phase-header" onclick="togglePhase(3)">';
  html += '<div class="phase-header-left"><div class="phase-icon">✅</div>';
  html += '<div><div class="phase-title">After the event</div><div class="phase-subtitle">What to do next</div></div></div>';
  html += '<div class="phase-controls">';
  html += '<button class="btn-speak-sm" onclick="event.stopPropagation();speakAfter()">🔊 Read</button>';
  html += '<span class="phase-chevron" id="phase-chev-3">›</span></div>';
  html += "</div>";
  html += '<div class="phase-body" id="phase-body-3">';
  html += '<div class="subsection">';
  html += '<div class="subsection-header"><div class="subsection-title">Things to do</div>';
  html += '<button class="btn-speak-sm" onclick="speakAfter()">🔊</button></div>';

    html += '<div class="action-item">';
    html += '<div class="action-check" id="action-' + i + '" onclick="toggleCheck(this)"></div>';
    html += '<div class="action-text">' + action + "</div></div>";
  });
  html += "</div>";
  html += "</div></div>";

  html += '<div style="height:20px;"></div>';

  document.getElementById("detail-content").innerHTML = html;

    '<button class="btn-action btn-ics" onclick="downloadICS()" style="margin-bottom:0;">📥 Download calendar file</button>';

function speakBefore() {
  var ev = currentEvent; if (!ev) return;
  var t = "Before you go. " + ev.before.journeyTip + ". What to bring: " + ev.before.documents.join(". ");
  if (ev.weather) t += ". Weather: " + ev.weather.temp + ". " + ev.weather.advice;
  speak(t);
}

function speakArrival() {
  var ev = currentEvent; if (!ev) return;
  var t = "When you get there. " + ev.arrival.kiosk + ". " + ev.arrival.contact;
  speak(t);
}

function speakAfter() {
  var ev = currentEvent; if (!ev) return;
  speak("After the event. Things to do: " + ev.after.actions.join(". "));
}

function addGCal() {
  var ev = currentEvent;
  var ds = ev.date.replace(/-/g,""), ts = ev.time.replace(":","") + "00", te = ev.endTime.replace(":","") + "00";
  var loc = ev.online ? "Online" : ev.location.address;
  window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text=" + encodeURIComponent(ev.title) +
    "&dates=" + ds + "T" + ts + "/" + ds + "T" + te +
    "&details=" + encodeURIComponent(ev.before.documents.join(", ")) +
    "&location=" + encodeURIComponent(loc), "_blank");
}

function downloadICS() {
  var ev = currentEvent;
  var ds = ev.date.replace(/-/g,""), ts = ev.time.replace(":","") + "00", te = ev.endTime.replace(":","") + "00";
  var loc = ev.online ? "Online" : ev.location.address;
  var ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Heart n Soul//EN\r\nBEGIN:VEVENT\r\n" +
    "DTSTART:" + ds + "T" + ts + "\r\nDTEND:" + ds + "T" + te + "\r\n" +
    "SUMMARY:" + ev.title + "\r\nLOCATION:" + loc + "\r\nEND:VEVENT\r\nEND:VCALENDAR";
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([ics], { type: "text/calendar" }));
  a.download = ev.title.replace(/\s+/g,"_") + ".ics";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
}

function showHome() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  showScreen("screen-home"); window.scrollTo(0, 0);
}

renderHome();
</script>
