<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>My Appointments — Heart n Soul</title>
  <style>
    :root {
      --red: #c0392b;
      --red-light: #fde0d8;
      --red-pale: #fff8f4;
      --white: #ffffff;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e8e0dc;
      --green: #1e8449;
      --green-bg: #eafaf1;
      --amber: #b7770d;
      --amber-bg: #fef9e7;
      --blue: #1a5276;
      --blue-bg: #eaf4fb;
      --alert-bg: #fdedec;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      background: var(--red-pale);
      color: var(--text);
      font-size: 18px;
      line-height: 1.5;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 90px;
    }
    .screen { display: none; }
    .screen.active { display: block; }

    /* HEADER */
    .header {
      background: var(--red);
      color: white;
      padding: 18px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 22px; font-weight: 800; }
    .header-date { font-size: 14px; opacity: 0.85; margin-top: 2px; }
    .btn-speak {
      background: rgba(255,255,255,0.22);
      border: none;
      color: white;
      border-radius: 30px;
      padding: 9px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-speak:active { background: rgba(255,255,255,0.38); }
    .btn-back {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      padding: 4px 12px 4px 0;
      font-family: inherit;
    }

    /* WEATHER BAR */
    .weather-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      color: var(--muted);
    }

    /* EVENT CARDS */
    .section-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 18px 20px 8px;
    }
    .event-card {
      background: var(--white);
      border-radius: var(--radius);
      margin: 0 16px 12px;
      padding: 18px 48px 18px 18px;
      box-shadow: var(--shadow);
      cursor: pointer;
      border: 2.5px solid transparent;
      position: relative;
      transition: border-color 0.12s;
    }
    .event-card:active { border-color: var(--red); }
    .event-type-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      border-radius: 14px 0 0 14px;
    }
    .event-title { font-size: 20px; font-weight: 800; line-height: 1.25; margin-bottom: 8px; }
    .event-meta { color: var(--muted); font-size: 16px; }
    .event-meta-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .alert-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--alert-bg);
      color: var(--red);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 14px;
      font-weight: 700;
      margin-top: 10px;
    }
    .chevron { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #ccc; font-size: 22px; }

    /* DETAIL */
    .detail-content { padding-bottom: 110px; }

    /* ALERT BANNER */
    .alert-banner {
      background: var(--alert-bg);
      border-left: 5px solid var(--red);
      padding: 18px 20px;
    }
    .alert-title { font-size: 18px; font-weight: 800; color: var(--red); margin-bottom: 6px; }
    .alert-msg { font-size: 17px; margin-bottom: 10px; }
    .alert-fix { font-size: 16px; color: var(--green); font-weight: 700; }

    /* HERO */
    .detail-hero { padding: 20px 20px 0; }
    .detail-title { font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 14px; }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      background: var(--red-light);
      color: var(--red);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 15px;
      font-weight: 700;
    }

    /* CARD SECTIONS */
    .card-section {
      background: var(--white);
      border-radius: var(--radius);
      margin: 14px 16px 0;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .card-head {
      padding: 14px 18px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-body { padding: 16px 18px; }

    /* PHOTOS */
    .venue-photos {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 16px 18px 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .venue-photos::-webkit-scrollbar { display: none; }
    .venue-photo {
      width: 230px;
      height: 148px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
      scroll-snap-align: start;
      background: var(--border);
    }
    .photo-caption { font-size: 13px; color: var(--muted); padding: 0 18px 6px; font-style: italic; }

    .loc-name { font-size: 19px; font-weight: 800; margin-bottom: 4px; }
    .loc-address { font-size: 16px; color: var(--muted); margin-bottom: 10px; }
    .loc-floor {
      font-size: 16px;
      background: var(--amber-bg);
      color: var(--amber);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-weight: 600;
    }

    /* TRANSPORT TOGGLE */
    .transport-toggle { display: flex; gap: 10px; margin-bottom: 16px; }
    .t-btn {
      flex: 1;
      padding: 14px 8px;
      border-radius: var(--radius-sm);
      border: 2.5px solid var(--border);
      background: var(--white);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      color: var(--muted);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: all 0.12s;
    }
    .t-btn .ti { font-size: 28px; }
    .t-btn.active { border-color: var(--red); background: var(--red-light); color: var(--red); }

    .t-panel { display: none; }
    .t-panel.active { display: block; }

    .route-group { margin-bottom: 18px; }
    .route-group:last-child { margin-bottom: 0; }
    .route-label { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 10px; }
    .route-step { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .route-step:last-child { border-bottom: none; }
    .step-num {
      background: var(--red);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .step-text { font-size: 16px; line-height: 1.5; }

    /* WEATHER */
    .wx-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .wx-icon { font-size: 52px; }
    .wx-temp { font-size: 34px; font-weight: 800; line-height: 1; }
    .wx-desc { font-size: 16px; color: var(--muted); margin-top: 3px; }
    .wx-tip {
      background: var(--amber-bg);
      color: var(--amber);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 700;
    }

    /* BIG ACTION BUTTONS */
    .btn-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 10px;
      text-decoration: none;
      color: white;
    }
    .btn-action:last-child { margin-bottom: 0; }
    .btn-maps { background: #4285f4; }
    .btn-uber { background: #000; }
    .btn-zoom { background: #2d8cff; }
    .btn-gcal { background: var(--green); }
    .btn-ics { background: var(--blue); }

    /* NOTES */
    .notes-text { font-size: 17px; line-height: 1.65; }

    /* ONLINE */
    .online-block { text-align: center; padding: 10px 0 4px; }
    .zoom-id {
      font-family: monospace;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 3px;
      background: var(--blue-bg);
      color: var(--blue);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      margin: 8px 0;
      display: inline-block;
    }

    /* CONTACT */
    .contact-row { display: flex; align-items: center; gap: 12px; font-size: 17px; }
    .contact-info .name { font-weight: 800; }
    .contact-info .detail { color: var(--muted); font-size: 16px; }

    /* STICKY BOTTOM */
    .sticky-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 480px;
      margin: 0 auto;
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 200;
    }

    /* DIVIDER */
    .route-divider { border: none; border-top: 2px dashed #e8e0dc; margin: 16px 0; }

    /* SPEAK SECTION BTN */
    .speak-btn-inline {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
let currentEvent = null;

function formatDate(ds) {
  return new Date(ds + 'T00:00:00').toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long'
  });
}

function dayLabel(ds) {
  const d = new Date(ds + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return d.toLocaleDateString('en-GB', { weekday: 'long' });
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1;
  window.speechSynthesis.speak(u);
}

function speakHome() {
  const txt = 'Your upcoming appointments. ' + EVENTS.map(e =>
    `${e.title}. ${dayLabel(e.date)}, ${e.time}. ${e.online ? 'Online.' : e.location.name + '.'}`
  ).join(' Next: ');
  speak(txt);
}

function speakDetail(ev) {
  let t = `${ev.title}. ${formatDate(ev.date)} at ${ev.time}. `;
  if (ev.alert) t += `Important notice: ${ev.alert.message} ${ev.alert.fix} `;
  if (ev.online) {
    t += `This is an online meeting on Zoom. Meeting ID: ${ev.location.zoomId}. Password: ${ev.location.zoomPassword}. `;
  } else {
    t += `Location: ${ev.location.name}. ${ev.location.address}. `;
  }
  t += `What to expect: ${ev.notes.replace(/\n/g,' ')}. `;
  if (ev.weather) t += `Weather: ${ev.weather.temp}, ${ev.weather.description}. ${ev.weather.advice.replace(/[🌂☀️]/g,'')}`;
  speak(t);
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function renderHome() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const list = document.getElementById('events-list');
  list.innerHTML = EVENTS.map(ev => `
    <div class="event-card" onclick="showDetail(${ev.id})">
      <div class="event-type-bar" style="background:${ev.typeColor}"></div>
      <div class="event-title">${ev.title}</div>
      <div class="event-meta">
        <div class="event-meta-row">📅 <strong>${dayLabel(ev.date)}</strong> — ${formatDate(ev.date)}</div>
        <div class="event-meta-row">🕐 ${ev.time} &nbsp;·&nbsp; ${ev.duration}</div>
        <div class="event-meta-row">${ev.online ? '💻 Online' : '📍 ' + ev.location.name}</div>
      </div>
      ${ev.alert ? `<div class="alert-chip">⚠️ Important notice</div>` : ''}
      <span class="chevron">›</span>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════
// DETAIL
// ═══════════════════════════════════════════
function showDetail(id) {
  currentEvent = EVENTS.find(e => e.id === id);
  const ev = currentEvent;
  let html = '';

  // Alert
  if (ev.alert) {
    html += `
      <div class="alert-banner">
        <div class="alert-title">${ev.alert.title}</div>
        <div class="alert-msg">${ev.alert.message}</div>
        <div class="alert-fix">${ev.alert.fix}</div>
      </div>`;
  }

  // Hero
  html += `
    <div class="detail-hero">
      <div class="detail-title">${ev.title}</div>
      <div class="pills">
        <span class="pill">📅 ${formatDate(ev.date)}</span>
        <span class="pill">🕐 ${ev.time}</span>
        <span class="pill">${ev.duration}</span>
      </div>
    </div>`;

  // Location
  if (ev.online) {
    html += `
      <div class="card-section">
        <div class="card-head">How to join
          <button class="speak-btn-inline" onclick="speak('Join on Zoom. Meeting ID: ${ev.location.zoomId}. Password: ${ev.location.zoomPassword}.')">🔊</button>
        </div>
        <div class="card-body" style="text-align:center; padding-top:20px;">
          <div style="font-size:48px; margin-bottom:10px;">💻</div>
          <div style="font-size:20px; font-weight:800; margin-bottom:14px;">${ev.location.name}</div>
          <div style="font-size:15px; color:var(--muted); margin-bottom:6px;">Meeting ID</div>
          <div class="zoom-id">${ev.location.zoomId}</div>
          <div style="font-size:16px; color:var(--muted); margin: 8px 0 18px;">Password: <strong>${ev.location.zoomPassword}</strong></div>
          <a href="${ev.location.zoomLink}" target="_blank" class="btn-action btn-zoom">🎥 Open Zoom now</a>
        </div>
      </div>`;
  } else {
    html += `
      <div class="card-section">
        <div class="card-head">Where to go
          <button class="speak-btn-inline" onclick="speak('${ev.location.name}. ${ev.location.address}. ${ev.location.floor.replace(/📌/g,'')}')">🔊</button>
        </div>
        <div class="venue-photos">
          ${ev.location.photos.map(p => `<img class="venue-photo" src="${p.url}" alt="${p.caption}" loading="lazy">`).join('')}
        </div>
        <div class="photo-caption">Swipe to see more photos →</div>
        <div class="card-body" style="padding-top:10px;">
          <div class="loc-name">${ev.location.name}</div>
          <div class="loc-address">${ev.location.address}</div>
          <div class="loc-floor">${ev.location.floor}</div>
        </div>
      </div>`;

    // Travel
    html += `
      <div class="card-section">
        <div class="card-head">How to get there
          <button class="speak-btn-inline" onclick="speakTransport()">🔊</button>
        </div>
        <div class="card-body">
          <div class="transport-toggle">
            <button class="t-btn active" id="btn-pub" onclick="setTransport('pub')">
              <span class="ti">🚌</span>Public Transport
            </button>
            <button class="t-btn" id="btn-priv" onclick="setTransport('priv')">
              <span class="ti">🚗</span>Personal / Uber
            </button>
          </div>

          <div class="t-panel active" id="panel-pub">
            ${ev.location.publicRoutes.map((r, ri) => `
              <div class="route-group">
                <div class="route-label">${r.icon} ${r.label}</div>
                ${r.steps.map((s, i) => `
                  <div class="route-step">
                    <div class="step-num">${i+1}</div>
                    <div class="step-text">${s}</div>
                  </div>`).join('')}
              </div>
              ${ri < ev.location.publicRoutes.length - 1 ? '<hr class="route-divider">' : ''}
            `).join('')}
          </div>

          <div class="t-panel" id="panel-priv">
            ${ev.location.privateRoutes.map((r, ri) => `
              <div class="route-group">
                <div class="route-label">${r.icon} ${r.label}</div>
                ${r.steps.map((s, i) => `
                  <div class="route-step">
                    <div class="step-num">${i+1}</div>
                    <div class="step-text">${s}</div>
                  </div>`).join('')}
              </div>
              ${ri < ev.location.privateRoutes.length - 1 ? '<hr class="route-divider">' : ''}
            `).join('')}
            <div style="margin-top:18px;">
              <a href="${ev.location.googleMaps}" target="_blank" class="btn-action btn-maps">🗺️ Open in Google Maps</a>
              <a href="${ev.location.uber}" target="_blank" class="btn-action btn-uber">🚕 Book an Uber</a>
            </div>
          </div>
        </div>
      </div>`;
  }

  // Weather
  if (ev.weather) {
    html += `
      <div class="card-section">
        <div class="card-head">Weather on the day
          <button class="speak-btn-inline" onclick="speak('${ev.weather.temp}, ${ev.weather.description}. ${ev.weather.advice.replace(/[🌂☀️⛅]/g,'')}')">🔊</button>
        </div>
        <div class="card-body">
          <div class="wx-row">
            <div class="wx-icon">${ev.weather.icon}</div>
            <div>
              <div class="wx-temp">${ev.weather.temp}</div>
              <div class="wx-desc">${ev.weather.description}</div>
            </div>
          </div>
          <div class="wx-tip">${ev.weather.advice}</div>
        </div>
      </div>`;
  }

  // Notes
  html += `
    <div class="card-section">
      <div class="card-head">What to expect
        <button class="speak-btn-inline" onclick="speak('${ev.notes.replace(/'/g,''').replace(/\n/g,' ')}')">🔊</button>
      </div>
      <div class="card-body">
        <div class="notes-text">${ev.notes.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;

  // Contact
  html += `
    <div class="card-section">
      <div class="card-head">Contact</div>
      <div class="card-body">
        <div class="contact-row">
          <span style="font-size:28px;">👤</span>
          <div class="contact-info">
            <div class="name">${ev.contact.name}</div>
            <div class="detail">${ev.contact.detail}</div>
          </div>
        </div>
      </div>
    </div>
    <div style="height:20px;"></div>`;

  document.getElementById('detail-content').innerHTML = html;

  // Sticky add to calendar
  document.getElementById('sticky-cal').innerHTML = `
    <a onclick="addGCal()" class="btn-action btn-gcal" style="margin-bottom:8px; cursor:pointer;">📅 Add to Google Calendar</a>
    <a onclick="downloadICS()" class="btn-action btn-ics" style="margin-bottom:0; cursor:pointer;">📥 Download calendar file (.ics)</a>
  `;

  document.getElementById('detail-speak-btn').onclick = () => speakDetail(ev);

  showScreen('screen-detail');
  window.scrollTo(0, 0);
}

function setTransport(type) {
  ['pub','priv'].forEach(t => {
    document.getElementById('btn-'+t).classList.toggle('active', t === type);
    document.getElementById('panel-'+t).classList.toggle('active', t === type);
  });
}

function speakTransport() {
  if (!currentEvent || currentEvent.online) return;
  const r = currentEvent.location.publicRoutes[0];
  speak('Public transport. ' + r.label + '. ' + r.steps.join('. '));
}

// ═══════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════
function addGCal() {
  const ev = currentEvent;
  const ds = ev.date.replace(/-/g,'');
  const ts = ev.time.replace(':','') + '00';
  const te = ev.endTime.replace(':','') + '00';
  const loc = ev.online ? 'Online - Zoom' : ev.location.address;
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.title)}&dates=${ds}T${ts}/${ds}T${te}&details=${encodeURIComponent(ev.notes)}&location=${encodeURIComponent(loc)}`;
  window.open(url, '_blank');
}

function downloadICS() {
  const ev = currentEvent;
  const ds = ev.date.replace(/-/g,'');
  const ts = ev.time.replace(':','') + '00';
  const te = ev.endTime.replace(':','') + '00';
  const loc = ev.online ? 'Online - Zoom' : ev.location.address;
  const ics = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Heart n Soul//EN',
    'BEGIN:VEVENT',
    `DTSTART:${ds}T${ts}`,
    `DTEND:${ds}T${te}`,
    `SUMMARY:${ev.title}`,
    `LOCATION:${loc}`,
    `DESCRIPTION:${ev.notes.replace(/\n/g,'\\n')}`,
    'END:VEVENT', 'END:VCALENDAR'
  ].join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ics], { type: 'text/calendar' }));
  a.download = ev.title.replace(/\s+/g,'_') + '.ics';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ═══════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showHome() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  showScreen('screen-home');
  window.scrollTo(0,0);
}

renderHome();
</script>
