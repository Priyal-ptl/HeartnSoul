  <style>
    :root {
      --red: #c0392b; --red-light: #fde0d8; --red-pale: #fff8f4;
      --white: #fff; --text: #1a1a1a; --muted: #666; --border: #e8e0dc;
      --green: #1e8449; --green-bg: #eafaf1;
      --amber: #b7770d; --amber-bg: #fef9e7;
      --blue: #1a5276; --blue-bg: #eaf4fb;
      --alert-bg: #fdedec; --radius: 16px; --radius-sm: 10px;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      background: var(--red-pale); color: var(--text);
      font-size: 18px; line-height: 1.5;
      max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .header {
      background: var(--red); color: white;
      padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 22px; font-weight: 800; }
    .header-date { font-size: 14px; opacity: 0.85; margin-top: 2px; }
    .btn-speak {
      background: rgba(255,255,255,0.22); border: none; color: white;
      border-radius: 30px; padding: 9px 16px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; flex-shrink: 0;
    }
    .btn-back {
      background: none; border: none; color: white;
      font-size: 18px; font-weight: 700; cursor: pointer; font-family: inherit; padding: 4px 12px 4px 0;
    }
    .weather-bar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 10px;
      font-size: 16px; color: var(--muted);
    }
    .section-label {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); padding: 18px 20px 8px;
    }
    .event-card {
      background: var(--white); border-radius: var(--radius);
      margin: 0 16px 12px; padding: 18px 48px 18px 22px;
      box-shadow: var(--shadow); cursor: pointer;
      border: 2.5px solid transparent; position: relative;
    }
    .event-card:active { border-color: var(--red); }
    .event-type-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 6px; border-radius: 14px 0 0 14px;
    }
    .event-title { font-size: 20px; font-weight: 800; line-height: 1.25; margin-bottom: 8px; }
    .event-meta { color: var(--muted); font-size: 16px; }
    .event-meta-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .alert-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--alert-bg); color: var(--red);
      border-radius: 20px; padding: 5px 12px; font-size: 14px; font-weight: 700; margin-top: 10px;
    }
    .chevron { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #ccc; font-size: 22px; }
    .detail-content { padding-bottom: 120px; }
    .alert-banner { background: var(--alert-bg); border-left: 5px solid var(--red); padding: 18px 20px; }
    .alert-title { font-size: 18px; font-weight: 800; color: var(--red); margin-bottom: 6px; }
    .alert-msg { font-size: 17px; margin-bottom: 10px; }
    .alert-fix { font-size: 16px; color: var(--green); font-weight: 700; }
    .detail-hero { padding: 20px 20px 0; }
    .detail-title { font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 14px; }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { background: var(--red-light); color: var(--red); border-radius: 20px; padding: 6px 14px; font-size: 15px; font-weight: 700; }
    .card-section { background: var(--white); border-radius: var(--radius); margin: 14px 16px 0; overflow: hidden; box-shadow: var(--shadow); }
    .card-head {
      padding: 14px 18px; font-size: 13px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .card-body { padding: 16px 18px; }
    .venue-photos {
      display: flex; gap: 10px; overflow-x: auto;
      padding: 16px 18px 10px; -webkit-overflow-scrolling: touch;
    }
    .venue-photos::-webkit-scrollbar { display: none; }
    .venue-photo { width: 230px; height: 148px; object-fit: cover; border-radius: 12px; flex-shrink: 0; background: var(--border); }
    .photo-caption { font-size: 13px; color: var(--muted); padding: 0 18px 6px; font-style: italic; }
    .loc-name { font-size: 19px; font-weight: 800; margin-bottom: 4px; }
    .loc-address { font-size: 16px; color: var(--muted); margin-bottom: 10px; }
    .loc-floor { font-size: 16px; background: var(--amber-bg); color: var(--amber); border-radius: var(--radius-sm); padding: 10px 14px; font-weight: 600; }
    .transport-toggle { display: flex; gap: 10px; margin-bottom: 16px; }
    .t-btn {
      flex: 1; padding: 14px 8px; border-radius: var(--radius-sm);
      border: 2.5px solid var(--border); background: var(--white);
      font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      color: var(--muted); text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .t-btn .ti { font-size: 28px; }
    .t-btn.active { border-color: var(--red); background: var(--red-light); color: var(--red); }
    .t-panel { display: none; }
    .t-panel.active { display: block; }
    .route-group { margin-bottom: 18px; }
    .route-group:last-child { margin-bottom: 0; }
    .route-label { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 10px; }
    .route-step { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .route-step:last-child { border-bottom: none; }
    .step-num {
      background: var(--red); color: white; width: 28px; height: 28px;

    .step-text { font-size: 16px; line-height: 1.5; }
    .route-divider { border: none; border-top: 2px dashed #e8e0dc; margin: 16px 0; }
    .wx-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .wx-icon { font-size: 52px; }
    .wx-temp { font-size: 34px; font-weight: 800; line-height: 1; }
    .wx-desc { font-size: 16px; color: var(--muted); margin-top: 3px; }
    .wx-tip { background: var(--amber-bg); color: var(--amber); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 16px; font-weight: 700; }
    .btn-action {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px; border-radius: var(--radius-sm); border: none;
      font-size: 17px; font-weight: 800; cursor: pointer; font-family: inherit;
      margin-bottom: 10px; text-decoration: none; color: white;
    }
    .btn-action:last-child { margin-bottom: 0; }

    .btn-uber { background: #000; }
    .btn-zoom { background: #2d8cff; }
    .btn-gcal { background: var(--green); }
    .btn-ics { background: var(--blue); }
    .btn-call { background: #27ae60; }
    .notes-text { font-size: 17px; line-height: 1.65; }
    .zoom-id { font-family: monospace; font-size: 26px; font-weight: 800; letter-spacing: 3px; background: var(--blue-bg); color: var(--blue); padding: 12px 20px; border-radius: var(--radius-sm); margin: 8px 0; display: inline-block; }
    .contact-row { display: flex; align-items: center; gap: 12px; font-size: 17px; }
    .sticky-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 480px; margin: 0 auto;
      background: var(--white); border-top: 1px solid var(--border);
      padding: 12px 16px; z-index: 200;
    }
  </style>
</head>

var currentEvent = null;

function formatDate(ds) {
  return new Date(ds + "T00:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });
}

function dayLabel(ds) {
  var d = new Date(ds + "T00:00:00");
  var today = new Date(); today.setHours(0,0,0,0);
  var diff = Math.round((d - today) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  return d.toLocaleDateString("en-GB", { weekday: "long" });
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1;
  window.speechSynthesis.speak(u);
}

function speakHome() {
  var txt = "Your upcoming appointments. " + EVENTS.map(function(e) {
    return e.title + ". " + dayLabel(e.date) + ", " + e.time + ". " + (e.online ? "Online." : e.location.name + ".");
  }).join(" Next: ");
  speak(txt);
}

function speakDetail() {
  var ev = currentEvent;
  if (!ev) return;
  var t = ev.title + ". " + formatDate(ev.date) + " at " + ev.time + ". ";
  if (ev.alert) t += "Important notice: " + ev.alert.message + " " + ev.alert.fix + " ";
  if (ev.online) {
    if (ev.isPhone) {
      t += "This is a phone call. Your doctor will call you at " + ev.time + ". ";
    } else {
      t += "This is an online meeting on Zoom. Meeting ID: " + ev.location.zoomId + ". Password: " + ev.location.zoomPassword + ". ";
    }
  } else {
    t += "Location: " + ev.location.name + ". " + ev.location.address + ". ";
  }
  t += "What to expect: " + ev.notes + ". ";
  if (ev.weather) t += "Weather: " + ev.weather.temp + ", " + ev.weather.description + ". " + ev.weather.advice;
  speak(t);
}

function renderHome() {
  document.getElementById("today-date").textContent =
    new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

  var html = "";
  EVENTS.forEach(function(ev) {
    html += '<div class="event-card" onclick="showDetail(' + ev.id + ')">';
    html += '<div class="event-type-bar" style="background:' + ev.typeColor + '"></div>';
    html += '<div class="event-title">' + ev.title + "</div>";
    html += '<div class="event-meta">';
    html += '<div class="event-meta-row">📅 <strong>' + dayLabel(ev.date) + "</strong> — " + formatDate(ev.date) + "</div>";
    html += '<div class="event-meta-row">🕐 ' + ev.time + " &nbsp;·&nbsp; " + ev.duration + "</div>";
    html += '<div class="event-meta-row">' + (ev.online ? "💻 Online" : "📍 " + ev.location.name) + "</div>";
    html += "</div>";
    if (ev.alert) html += '<div class="alert-chip">⚠️ Important notice</div>';
    html += '<span class="chevron">›</span>';
    html += "</div>";
  });
  document.getElementById("events-list").innerHTML = html;
}

function showDetail(id) {
  currentEvent = null;
  for (var i = 0; i < EVENTS.length; i++) {
    if (EVENTS[i].id === id) { currentEvent = EVENTS[i]; break; }
  }
  if (!currentEvent) return;
  var ev = currentEvent;
  var html = "";

  if (ev.alert) {
    html += '<div class="alert-banner">';
    html += '<div class="alert-title">⚠️ ' + ev.alert.title + "</div>";
    html += '<div class="alert-msg">' + ev.alert.message + "</div>";
    html += '<div class="alert-fix">✅ ' + ev.alert.fix + "</div>";
    html += "</div>";
  }

  html += '<div class="detail-hero">';
  html += '<div class="detail-title">' + ev.title + "</div>";
  html += '<div class="pills">';
  html += '<span class="pill">📅 ' + formatDate(ev.date) + "</span>";
  html += '<span class="pill">🕐 ' + ev.time + "</span>";
  html += '<span class="pill">' + ev.duration + "</span>";
  html += "</div></div>";

  if (ev.online) {
    html += '<div class="card-section"><div class="card-head">How to join</div><div class="card-body" style="text-align:center;padding-top:20px;">';
    if (ev.isPhone) {
      html += '<div style="font-size:52px;margin-bottom:12px;">📞</div>';
      html += '<div style="font-size:20px;font-weight:800;margin-bottom:10px;">Your GP will call you</div>';
      html += '<div style="font-size:17px;margin-bottom:6px;">Phone number</div>';
      html += '<div class="zoom-id">' + ev.location.zoomId + "</div>";
      html += '<div style="font-size:16px;color:var(--muted);margin:10px 0 18px;">Make sure your phone is charged and not on silent.</div>';
      html += '<a href="' + ev.location.zoomLink + '" class="btn-action btn-call">📞 Call them back if needed</a>';
    } else {
      html += '<div style="font-size:52px;margin-bottom:12px;">💻</div>';
      html += '<div style="font-size:20px;font-weight:800;margin-bottom:10px;">' + ev.location.name + "</div>";
      html += '<div style="font-size:15px;color:var(--muted);margin-bottom:6px;">Meeting ID</div>';
      html += '<div class="zoom-id">' + ev.location.zoomId + "</div>";
      html += '<div style="font-size:16px;color:var(--muted);margin:8px 0 18px;">Password: <strong>' + ev.location.zoomPassword + "</strong></div>";
      html += '<a href="' + ev.location.zoomLink + '" target="_blank" class="btn-action btn-zoom">🎥 Open Zoom now</a>';
    }
    html += "</div></div>";
  } else {
    html += '<div class="card-section"><div class="card-head">Where to go</div>';
    html += '<div class="venue-photos">';
    ev.location.photos.forEach(function(p) {
      html += '<img class="venue-photo" src="' + p.url + '" alt="' + p.caption + '" loading="lazy">';
    });
    html += "</div>";
    html += '<div class="photo-caption">Swipe to see more photos →</div>';
    html += '<div class="card-body" style="padding-top:10px;">';
    html += '<div class="loc-name">' + ev.location.name + "</div>";
    html += '<div class="loc-address">' + ev.location.address + "</div>";
    html += '<div class="loc-floor">📌 ' + ev.location.floor + "</div>";
    html += "</div></div>";

    html += '<div class="card-section"><div class="card-head">How to get there</div><div class="card-body">';
    html += '<div class="transport-toggle">';
    html += '<button class="t-btn active" id="btn-pub" onclick="setTransport(\'pub\')"><span class="ti">🚌</span>Public Transport</button>';
    html += '<button class="t-btn" id="btn-priv" onclick="setTransport(\'priv\')"><span class="ti">🚗</span>Personal / Uber</button>';
    html += "</div>";

    html += '<div class="t-panel active" id="panel-pub">';
    ev.location.publicRoutes.forEach(function(r, ri) {
      html += '<div class="route-group">';
      html += '<div class="route-label">' + r.icon + " " + r.label + "</div>";
      r.steps.forEach(function(s, i) {
        html += '<div class="route-step"><div class="step-num">' + (i+1) + '</div><div class="step-text">' + s + "</div></div>";
      });
      html += "</div>";
      if (ri < ev.location.publicRoutes.length - 1) html += '<hr class="route-divider">';
    });
    html += "</div>";

    html += '<div class="t-panel" id="panel-priv">';
    ev.location.privateRoutes.forEach(function(r, ri) {
      html += '<div class="route-group">';
      html += '<div class="route-label">' + r.icon + " " + r.label + "</div>";
      r.steps.forEach(function(s, i) {
        html += '<div class="route-step"><div class="step-num">' + (i+1) + '</div><div class="step-text">' + s + "</div></div>";
      });
      html += "</div>";
      if (ri < ev.location.privateRoutes.length - 1) html += '<hr class="route-divider">';
    });
    html += '<div style="margin-top:18px;">';
    html += '<a href="' + ev.location.googleMaps + '" target="_blank" class="btn-action btn-maps">🗺️ Open in Google Maps</a>';
    html += '<a href="' + ev.location.uber + '" target="_blank" class="btn-action btn-uber">🚕 Book an Uber</a>';
    html += "</div></div>";
    html += "</div></div>";
  }

  if (ev.weather) {
    html += '<div class="card-section"><div class="card-head">Weather on the day</div><div class="card-body">';
    html += '<div class="wx-row"><div class="wx-icon">' + ev.weather.icon + "</div><div>";
    html += '<div class="wx-temp">' + ev.weather.temp + "</div>";
    html += '<div class="wx-desc">' + ev.weather.description + "</div>";
    html += "</div></div>";
    html += '<div class="wx-tip">💡 ' + ev.weather.advice + "</div>";
    html += "</div></div>";
  }

  html += '<div class="card-section"><div class="card-head">What to expect</div><div class="card-body">';
  html += '<div class="notes-text">' + ev.notes + "</div>";
  html += "</div></div>";

  html += '<div class="card-section"><div class="card-head">Contact</div><div class="card-body">';
  html += '<div class="contact-row"><span style="font-size:28px;">👤</span><div>';
  html += '<div style="font-weight:800;">' + ev.contact.name + "</div>";
  html += '<div style="color:var(--muted);font-size:16px;">' + ev.contact.detail + "</div>";
  html += "</div></div></div></div>";
  html += '<div style="height:20px;"></div>';

  document.getElementById("detail-content").innerHTML = html;
  document.getElementById("detail-speak-btn").onclick = speakDetail;

  document.getElementById("sticky-cal").innerHTML =
    '<button class="btn-action btn-gcal" onclick="addGCal()" style="margin-bottom:8px;">📅 Add to Google Calendar</button>' +
    '<button class="btn-action btn-ics" onclick="downloadICS()" style="margin-bottom:0;">📥 Download calendar file</button>';

  showScreen("screen-detail");
  window.scrollTo(0, 0);
}

function setTransport(type) {
  document.getElementById("btn-pub").classList.toggle("active", type === "pub");
  document.getElementById("btn-priv").classList.toggle("active", type === "priv");
  document.getElementById("panel-pub").classList.toggle("active", type === "pub");
  document.getElementById("panel-priv").classList.toggle("active", type === "priv");
}

function addGCal() {
  var ev = currentEvent;
  var ds = ev.date.replace(/-/g, "");
  var ts = ev.time.replace(":", "") + "00";
  var te = ev.endTime.replace(":", "") + "00";
  var loc = ev.online ? "Online" : ev.location.address;
  var url = "https://calendar.google.com/calendar/render?action=TEMPLATE&text=" + encodeURIComponent(ev.title) +
    "&dates=" + ds + "T" + ts + "/" + ds + "T" + te +
    "&details=" + encodeURIComponent(ev.notes) +
    "&location=" + encodeURIComponent(loc);
  window.open(url, "_blank");
}

function downloadICS() {
  var ev = currentEvent;
  var ds = ev.date.replace(/-/g, "");
  var ts = ev.time.replace(":", "") + "00";
  var te = ev.endTime.replace(":", "") + "00";
  var loc = ev.online ? "Online" : ev.location.address;
  var ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Heart n Soul//EN\r\nBEGIN:VEVENT\r\n" +
    "DTSTART:" + ds + "T" + ts + "\r\n" +
    "DTEND:" + ds + "T" + te + "\r\n" +
    "SUMMARY:" + ev.title + "\r\n" +
    "LOCATION:" + loc + "\r\n" +
    "DESCRIPTION:" + ev.notes + "\r\n" +
    "END:VEVENT\r\nEND:VCALENDAR";
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([ics], { type: "text/calendar" }));
  a.download = ev.title.replace(/\s+/g, "_") + ".ics";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
}

function showHome() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  showScreen("screen-home");
  window.scrollTo(0, 0);
}

renderHome();
</script>

</html>
